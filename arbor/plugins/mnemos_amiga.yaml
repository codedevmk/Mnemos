# mnemos_amiga.yaml — Arbor domain plugin for the Mnemos Amiga superiority task
#
# Reconciled against arbor's real plugin schema (arbor/plugins/base.py _KNOWN_PLUGIN_KEYS
# + plugins/mle_kaggle.yaml). Only these top-level keys are consumed by arbor:
#   name, description, schema_version,
#   eval_contract, protected_paths, required_outputs, config_overrides, profiles,
#   convergence, lifecycle_hooks,
#   meta_preamble_inject, meta_init_inject, meta_ideate_inject, meta_decide_inject,
#   sub_preamble_inject, sub_workflow_inject.
# Any other top-level key is silently dropped with a warning — do not add them.

schema_version: 1
name: mnemos_amiga
description: >
  Cycle-accuracy + performance optimization of the Mnemos Amiga subsystem against
  hardware-truth goldens, with WinUAE 6.0.3 as a regression-only baseline.

# --- Eval contract -----------------------------------------------------------------------
# arbor reads only: metric_direction, eval_cmd, submission_path, sample_submission_path
# (and an optional `contamination` block). The remaining keys here are domain documentation
# the coordinator/executor see via tree.meta; they are not interpreted by arbor.
eval_contract:
  metric_direction: maximize                      # ACS, 0-100, higher is better
  # Headless, deterministic, scriptable. Exit non-zero on harness error (≠ low score).
  eval_cmd: "python tools/conformance/run_eval.py --split {split} --tier {tier} --report {report_path}"
  metric: ACS
  dev_split: dev
  test_split: test                                # held-out; merge decisions only
  # Secondary constraint (lexicographic, floored — see task text): PTR x-realtime.
  constraints:
    - name: PTR
      goal: maximize
      floor: 1.0                                  # hard reject below floor
      parity_ref: winuae_6_0_3                    # bounded bonus only above this
  # Hard veto independent of the scalar.
  regression_veto:
    rule: "no previously-passing conformance test may transition to failing"

# --- Protected data (read-only; the merge guard blocks Executor edits here) ---------------
protected_paths:
  - tools/conformance/
  - testdata/golden/
  - testdata/baseline/

required_outputs:
  - "build/scratch/arbor/amiga/scheduler_event_table_dev.json"

# --- Staged budget profiles (a profile is applied only when selected) ---------------------
# Profile keys arbor understands: max_cycles, max_tree_depth, executor_timeout, time_budget.
profiles:
  smoke: { max_cycles: 3,  executor_timeout: 600 }
  pilot: { max_cycles: 8,  executor_timeout: 3600 }
  full:  { max_cycles: 24, executor_timeout: 21600 }

# --- Convergence detection ---------------------------------------------------------------
convergence:
  enabled: true
  min_experiments: 4
  window_size: 5
  improvement_threshold: 0.001
  parent_exhaustion_count: 3

# --- Coordinator prompt injection (was: prompts.coordinator_extra) ------------------------
meta_preamble_inject: |
  Decompose by Amiga subsystem (Agnus/Alice, Denise/Lisa, Paula, CPU, CIA/keyboard,
  disk/storage, RTG, perf-arch, compatibility). Pursue accuracy tiers in order
  (A500/OCS/cycle-exact → ECS → A1200/AGA → A3000/A4000+accelerators/RTG); do NOT
  open a higher tier until the current tier's gate passes. On any Mnemos/WinUAE
  divergence, adjudicate against Tier-A hardware-truth goldens and record the verdict
  — never auto-converge to WinUAE. Treat performance (PTR) as a floored, lexicographically
  subordinate constraint: never let a perf gain buy an accuracy regression.

meta_decide_inject: |
  Merge only on a held-out ACS gain that clears the threshold AND a clean regression veto:
  no previously-passing conformance test may transition to failing, even if the net scalar
  improves. Reject any change that drops PTR below its floor.

# --- Executor prompt injection (was: prompts.executor_extra) ------------------------------
sub_preamble_inject: |
  Cycle-exact tier uses a ZERO tolerance band. Performance changes (threading, dynarec,
  dirty rendering) are valid only if ACS holds exactly and the regression veto stays clean
  under deterministic scheduling. A zero-warning build is a precondition for a passing
  experiment — verify it before scoring.

sub_workflow_inject: |
  ## Workspace rules
  - testdata/golden/, testdata/baseline/, and tools/conformance/ are READ-ONLY. Never edit them.
  - Keep the build zero-warning; treat warnings as failures.
  - Evaluate with: python tools/conformance/run_eval.py --split <split> --tier <tier> --report <report_path>
  - The run must be deterministic: repeat-run trace/framebuffer/audio hashes must match exactly.
  - If you find a better direction outside the assigned idea, record it as a proposal in your
    report instead of silently widening scope.

# --- Lifecycle hooks ---------------------------------------------------------------------
# arbor runs scripts only for on_workspace_setup (once, pre-INIT) and on_finalize (once,
# post-STOP/timeout). after_executor exists but only snapshots `submission_path`; it does
# NOT run a script. Per-experiment clean-build/determinism gating therefore lives in the
# executor prompt injection above, with these scripts as start/end bookends.
lifecycle_hooks:
  on_workspace_setup:
    script: "scripts/assert_clean_build.sh"       # zero-warning gate at run start
    prompt: "A zero-warning build is a precondition for every passing experiment."
  on_finalize:
    script: "scripts/check_determinism.sh"        # repeat-run hash-equality check at run end
    prompt: "Confirm the merged trunk reproduces identical trace/framebuffer/audio hashes."
