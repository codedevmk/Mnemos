# mnemos_amiga.plugin.yaml — Arbor domain plugin for the Mnemos Amiga superiority task
#
# Per Arbor's design, the plugin carries: prompt-injection points, config overrides,
# profiles, lifecycle hooks, and the eval contract (protected data dirs, required outputs,
# timeout presets). This is a SHAPE sketch built from the documented plugin description.
# Reconcile every key against the canonical schema in the Arbor repo (examples/mle_kaggle.yaml
# + examples/kaggle_config.example.yaml) before the first run — do not assume field names.

name: mnemos_amiga
description: >
  Cycle-accuracy + performance optimization of the Mnemos Amiga subsystem against
  hardware-truth goldens, with WinUAE 6.0.3 as a regression-only baseline.

# --- Eval contract -----------------------------------------------------------------------
eval:
  # Headless, deterministic, scriptable. Runs a named test to a fixed cycle count and emits
  # trace + framebuffer + audio dumps, then scores against Tier-A goldens. Exit non-zero on
  # harness error (distinct from a low score).
  command: "python tools/conformance/run_eval.py --split {split} --tier {tier} --report {report_path}"
  metric: ACS                     # primary scalar, 0-100, higher is better
  goal: maximize
  dev_split: "dev"
  test_split: "test"             # held-out; used for merge decisions only

  # Secondary constraint surfaced to the coordinator (lexicographic, floored — see task text).
  constraints:
    - name: PTR                  # x-realtime at active tier on pinned host
      goal: maximize
      floor: 1.0                 # hard reject below floor
      parity_ref: winuae_6_0_3   # bonus only above this; bounded
  # Hard veto independent of the scalar.
  regression_veto:
    rule: "no previously-passing conformance test may transition to failing"

# --- Protected data (read-only; Executors must never edit) -------------------------------
protected_paths:
  - tools/conformance/            # the harness itself
  - testdata/golden/tier_a/       # hardware-truth oracle (correctness)
  - testdata/baseline/winuae_6_0_3/  # Tier-B regression scaffold ONLY
  # Non-redistributable assets are referenced by path from a local store, NOT committed:
  #   - $MNEMOS_AMIGA_ASSETS/kickstart/   (ROMs)
  #   - $MNEMOS_AMIGA_ASSETS/images/      (ADF/IPF/CAPS/WHDLoad)

required_outputs:
  - report_path                  # machine-readable per-run score: ACS, PTR, per-test pass/fail
  - "artifacts/superiority_wins.jsonl"  # logged Tier-A-confirmed Mnemos>WinUAE divergences

# --- Timeout presets (cycle-exact runs are slow; partial-metric recovery on timeout) -----
timeouts:
  smoke_seconds: 600
  pilot_seconds: 3600
  full_seconds: 21600

# --- Staged budget profiles (smoke -> pilot -> full) -------------------------------------
profiles:
  smoke:   { tiers: [a500_ocs_ce], max_cycles: 3,  executor: { max_turns: 60  } }
  pilot:   { tiers: [a500_ocs_ce], max_cycles: 8,  executor: { max_turns: 100 } }
  full:    { tiers: [a500_ocs_ce, ecs, aga_a1200], max_cycles: 24, executor: { max_turns: 160 } }

# --- Prompt-injection points (steer Executors/Coordinator without touching core) ---------
prompts:
  coordinator_extra: >
    Decompose by Amiga subsystem (Agnus/Alice, Denise/Lisa, Paula, CPU, CIA/keyboard,
    disk/storage, RTG, perf-arch, compatibility). Pursue accuracy tiers in order; do not
    open a higher tier until the current tier's gate passes. On any Mnemos/WinUAE divergence,
    adjudicate against Tier-A goldens and record the verdict — never auto-converge to WinUAE.
  executor_extra: >
    Cycle-exact tier uses a ZERO tolerance band. Perf changes (threading, dynarec, dirty
    rendering) are valid only if ACS holds and the regression veto stays clean under
    deterministic scheduling. Zero-warning build is a precondition for a passing experiment.

# --- Lifecycle hooks ---------------------------------------------------------------------
hooks:
  pre_experiment:  "scripts/assert_clean_build.sh"      # zero-warning gate before scoring
  post_experiment: "scripts/check_determinism.sh"       # repeat-run hash equality check
