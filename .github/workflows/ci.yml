name: ci

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  # Gates G1 (naming), G7 (license), G9 (ADR/front-matter lint) blocking;
  # G11 (token budgets) advisory. See constitution/MNE-CTX-PLAN-001.md §9.
  governance:
    name: governance
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Naming validator (G1)
        run: python3 tools/governance/naming_validator.py

      - name: Repo hygiene (G12)
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            # Pull request: lint only the files changed vs the PR base.
            python3 tools/governance/repo_hygiene.py --diff "origin/${{ github.base_ref }}"
          else
            # Push: lint only the files changed in this push (fall back to last commit).
            BEFORE="${{ github.event.before }}"
            git rev-parse -q --verify "$BEFORE^{commit}" >/dev/null 2>&1 || BEFORE="HEAD~1"
            python3 tools/governance/repo_hygiene.py --diff "$BEFORE"
          fi

      - name: ADR / front-matter lint (G9)
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            BASE="--base origin/${{ github.base_ref }}"
          else
            BASE=""
          fi
          python3 tools/governance/adr_lint.py --check-index $BASE

      - name: License audit (G7)
        run: python3 tools/governance/license_audit.py

      - name: Capsule drift (G2, pilot modules)
        run: |
          cd tools/governance && python3 gen_capsule.py --check \
            src/chips/cpu/z80 src/manifests/sms

      - name: Doc liveness (G3)
        run: cd tools/governance && python3 doc_liveness.py

      - name: Invariant coverage (G4)
        run: python3 tools/governance/invariant_check.py

      - name: Schema compatibility (G8)
        run: python3 tools/governance/schema_compat.py

      - name: Provenance trailers (G10)
        if: github.base_ref != ''
        run: |
          python3 tools/governance/trailer_check.py \
            --range "origin/${{ github.base_ref }}..HEAD"

      - name: Token budgets (G11, advisory)
        run: python3 tools/governance/token_budget.py

  format:
    name: clang-format
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin clang-format to the exact version used locally so the gate never
      # diverges from developer machines (the apt package floats and disagrees).
      - name: Install clang-format
        run: pip install "clang-format==21.1.2"

      - name: Check formatting
        run: |
          git ls-files '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx' \
            | xargs --no-run-if-empty clang-format --dry-run --Werror

  # Active-development matrix: Windows (debug + release) + one Linux GCC build.
  # GCC is kept because its strict -Werror catches portability issues MSVC and
  # clang miss (e.g. -Wdangling-reference); the broader fan-out (linux clang and
  # gcc-release, arm64, ASan/UBSan, foundation coverage) was trimmed to keep CI
  # fast during active builds. Re-add presets / the dropped jobs here for a wider
  # sweep before a release.
  build-test:
    name: ${{ matrix.preset }}
    needs: format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: windows-msvc-debug
          - os: windows-latest
            preset: windows-msvc-release
          - os: ubuntu-24.04
            preset: linux-gcc-debug

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Content-addressed compiler cache persisted across runs via the Actions
      # cache. sccache caches every object (incl. the SDL3 / Catch2 / zstd
      # FetchContent deps, whose sources are stable), so warm runs skip almost
      # all recompilation -- the cold first run still pays full price.
      - name: Set up sccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          variant: sccache
          key: ${{ matrix.preset }}

      - name: Install Linux tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            libasound2-dev libpulse-dev libaudio-dev libjack-jackd2-dev libsndio-dev \
            libusb-1.0-0-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libdbus-1-dev libibus-1.0-dev libudev-dev libpipewire-0.3-dev \
            libwayland-dev wayland-protocols libdecor-0-dev

      - name: Configure, build, and test on Windows
        if: runner.os == 'Windows'
        shell: cmd
        env:
          PRESET: ${{ matrix.preset }}
        run: |
          for /f "usebackq tokens=*" %%I in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VSINSTALL=%%I
          if not defined VSINSTALL exit /b 1
          set VSDEVCMD=%VSINSTALL%\Common7\Tools\VsDevCmd.bat
          if not exist "%VSDEVCMD%" exit /b 1
          call "%VSDEVCMD%" -arch=x64
          cmake --preset %PRESET% -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache -DCMAKE_POLICY_DEFAULT_CMP0141=NEW -DCMAKE_MSVC_DEBUG_INFORMATION_FORMAT=Embedded
          cmake --build --preset %PRESET%
          ctest --preset %PRESET% --output-on-failure

      - name: Configure
        if: runner.os == 'Linux'
        run: cmake --preset ${{ matrix.preset }} -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build
        if: runner.os == 'Linux'
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        if: runner.os == 'Linux'
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      # G5/G6 smoke: re-run the registry suites against the high-water marks.
      # Data-gated suites skip on hosted runners; the ratchet still catches a
      # passing suite turning red or vanishing from the build.
      - name: Oracle ratchet (G5/G6 smoke)
        if: matrix.preset == 'linux-gcc-debug'
        run: |
          python3 tools/governance/oracle_runner.py \
            --build-dir build/linux-gcc-debug
