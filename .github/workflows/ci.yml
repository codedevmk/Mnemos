name: ci

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  # Gates G1 (naming), G7 (license), G9 (ADR/front-matter lint) blocking;
  # G11 (token budgets) advisory. See constitution/MNE-CTX-PLAN-001.md §9.
  governance:
    name: governance
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Naming validator (G1)
        run: python3 tools/governance/naming_validator.py

      - name: ADR / front-matter lint (G9)
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            BASE="--base origin/${{ github.base_ref }}"
          else
            BASE=""
          fi
          python3 tools/governance/adr_lint.py --check-index $BASE

      - name: License audit (G7)
        run: python3 tools/governance/license_audit.py

      - name: Capsule drift (G2, pilot modules)
        run: |
          cd tools/governance && python3 gen_capsule.py --check \
            src/chips/cpu/z80 src/manifests/sms

      - name: Doc liveness (G3)
        run: cd tools/governance && python3 doc_liveness.py

      - name: Invariant coverage (G4)
        run: python3 tools/governance/invariant_check.py

      - name: Schema compatibility (G8)
        run: python3 tools/governance/schema_compat.py

      - name: Provenance trailers (G10)
        if: github.base_ref != ''
        run: |
          python3 tools/governance/trailer_check.py \
            --range "origin/${{ github.base_ref }}..HEAD"

      - name: Token budgets (G11, advisory)
        run: python3 tools/governance/token_budget.py

  format:
    name: clang-format
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin clang-format to the exact version used locally so the gate never
      # diverges from developer machines (the apt package floats and disagrees).
      - name: Install clang-format
        run: pip install "clang-format==21.1.2"

      - name: Check formatting
        run: |
          git ls-files '*.c' '*.cc' '*.cpp' '*.cxx' '*.h' '*.hh' '*.hpp' '*.hxx' \
            | xargs --no-run-if-empty clang-format --dry-run --Werror

  build-test:
    name: ${{ matrix.preset }}
    needs: format
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            preset: windows-msvc-debug
          - os: windows-latest
            preset: windows-msvc-release
          - os: ubuntu-24.04
            preset: linux-gcc-debug
          - os: ubuntu-24.04
            preset: linux-gcc-release
          - os: ubuntu-24.04
            preset: linux-clang-debug
          - os: ubuntu-24.04
            preset: linux-clang-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build \
            libasound2-dev libpulse-dev libaudio-dev libjack-jackd2-dev libsndio-dev \
            libusb-1.0-0-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libdbus-1-dev libibus-1.0-dev libudev-dev libpipewire-0.3-dev \
            libwayland-dev wayland-protocols libdecor-0-dev

      - name: Configure, build, and test on Windows
        if: runner.os == 'Windows'
        shell: cmd
        env:
          PRESET: ${{ matrix.preset }}
        run: |
          for /f "usebackq tokens=*" %%I in (`"%ProgramFiles(x86)%\Microsoft Visual Studio\Installer\vswhere.exe" -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath`) do set VSINSTALL=%%I
          if not defined VSINSTALL exit /b 1
          set VSDEVCMD=%VSINSTALL%\Common7\Tools\VsDevCmd.bat
          if not exist "%VSDEVCMD%" exit /b 1
          call "%VSDEVCMD%" -arch=x64
          cmake --preset %PRESET%
          cmake --build --preset %PRESET%
          ctest --preset %PRESET% --output-on-failure

      - name: Configure
        if: runner.os == 'Linux'
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        if: runner.os == 'Linux'
        run: cmake --build --preset ${{ matrix.preset }}

      - name: Test
        if: runner.os == 'Linux'
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      # G5/G6 smoke: re-run the registry suites against the high-water marks.
      # Data-gated suites skip on hosted runners; the ratchet still catches a
      # passing suite turning red or vanishing from the build.
      - name: Oracle ratchet (G5/G6 smoke)
        if: matrix.preset == 'linux-gcc-release'
        run: |
          python3 tools/governance/oracle_runner.py \
            --build-dir build/linux-gcc-release

  arm64:
    # The headless presets are arch-agnostic (they only disable the SDL3 apps);
    # this job is what makes the build ARM64 by running on a native aarch64
    # runner, so the architecture is reflected in the check name rather than the
    # preset name. See ADR 0010.
    name: arm64 / ${{ matrix.preset }}
    needs: format
    # Native aarch64 runner: no cross-compilation toolchain needed, and the core
    # runs on the same ISA Android targets (arm64-v8a).
    runs-on: ubuntu-24.04-arm
    strategy:
      fail-fast: false
      matrix:
        preset:
          - linux-gcc-headless-debug
          - linux-gcc-headless-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The headless presets build the core + tests only (MNEMOS_BUILD_APPS=OFF),
      # so the SDL3/windowing system packages are not required here -- just the
      # build generator.
      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Configure
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build --preset ${{ matrix.preset }}

      # Validates the deterministic core on aarch64. Golden-frame boot tests
      # self-skip (SKIP_RETURN_CODE 4) when ROM env vars are absent, as in the
      # other CI jobs; the foundation/chip/runtime unit tests run unconditionally.
      - name: Test
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

  sanitizers:
    name: linux-clang-asan
    needs: format
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install sanitizer tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm ninja-build \
            libasound2-dev libpulse-dev libaudio-dev libjack-jackd2-dev libsndio-dev \
            libusb-1.0-0-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libdbus-1-dev libibus-1.0-dev libudev-dev libpipewire-0.3-dev \
            libwayland-dev wayland-protocols libdecor-0-dev

      - name: Configure
        run: cmake --preset linux-clang-asan

      - name: Build
        run: cmake --build --preset linux-clang-asan

      - name: Test under ASan + UBSan
        run: ctest --preset linux-clang-asan --output-on-failure

  foundation-coverage:
    name: foundation-coverage
    needs: format
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm ninja-build \
            libasound2-dev libpulse-dev libaudio-dev libjack-jackd2-dev libsndio-dev \
            libusb-1.0-0-dev libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxtst-dev libxkbcommon-dev \
            libdrm-dev libgbm-dev libgl1-mesa-dev libgles2-mesa-dev libegl1-mesa-dev \
            libdbus-1-dev libibus-1.0-dev libudev-dev libpipewire-0.3-dev \
            libwayland-dev wayland-protocols libdecor-0-dev

      - name: Configure
        run: cmake --preset linux-clang-coverage

      - name: Build
        run: cmake --build --preset linux-clang-coverage

      - name: Measure Foundation branch coverage
        shell: pwsh
        run: |
          ./tools/coverage/measure-foundation-branch-coverage.ps1 `
            -BuildDir build/linux-clang-coverage `
            -MinimumBranchCoverage 75.0
