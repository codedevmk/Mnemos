# Bomber Man World / New Atomic Punk - Global Quest (Japan) -- Irem M90.
# Local evidence includes the V35 program pair plus Z80 program and DAC sample
# media, but no complete GA25 graphics ROM set yet.

[set]
schema      = "mnemos-romset/1"
name        = "bbmanwj"
board       = "irem_m90"
orientation = "horizontal"

[[region]]
name = "maincpu"
size = 0x100000

[[region.file]]
name   = "bbm2-h0.ic77"
offset = 0x000001
stride = 2
size   = 0x40000
crc32  = 0xe1407b91

[[region.file]]
name   = "bbm2-l0.ic79"
offset = 0x000000
stride = 2
size   = 0x40000
crc32  = 0x20873b49

[[region]]
name = "soundcpu"
size = 0x010000

[[region.file]]
name   = "bbm2-sp-a.ic33"
offset = 0x000000
size   = 0x10000
crc32  = 0xa4b0a66e

[[region]]
name = "samples"
size = 0x020000

[[region.file]]
name   = "bbm2-v0-b.ic30"
offset = 0x000000
size   = 0x20000
crc32  = 0x0ae655ff
