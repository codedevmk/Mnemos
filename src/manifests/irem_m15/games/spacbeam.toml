# Space Beam -- local Irem M15 corpus set.
# Schema mnemos-romset/1; this is a ROM-contract manifest. The executable
# first-pass board profile uses the M-15 MOS 6502 memory map.

[set]
schema      = "mnemos-romset/1"
name        = "spacbeam"
board       = "irem_m15"
orientation = "vertical"

[[region]]
name = "maincpu"
size = 0x10000

[[region.file]]
name    = "m1b"
aliases = ["spacbeam/m1b"]
offset  = 0x1000
size    = 0x0400
crc32   = 0x5a1c3e0b

[[region.file]]
name    = "m2b"
aliases = ["spacbeam/m2b"]
offset  = 0x1400
size    = 0x0400
crc32   = 0xa02bd9d7

