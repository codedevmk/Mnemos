# Black Jack (Irem, satellite unit, rev. T) -- Irem M78 ROM contract.
# Manifest-only local corpus contract. Public M78 metadata still marks this
# board not working and no-sound: I/O, video registers, communications, colors,
# and the M72-audio sample ROMs remain incomplete public evidence.

[set]
schema      = "mnemos-romset/1"
name        = "bj92"
board       = "irem_m78"
orientation = "vertical"
players     = 1
sound       = "ym2151+m72_audio_no_dump"

