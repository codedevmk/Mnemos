# Lode Runner IV - Teikoku Karano Dasshutsu -- Irem M62 region contract.
# Local wrapper: D:\emu\irem\M62\ldrun4.zip -> ldrun4.zip.
# Region placement follows the same public Irem M62 dump groups used by the
# earlier Lode Runner contracts. Exact KNA video priority, MC6803 port/timer
# behavior, bank behavior, and MSM5205 timing remain implementation gaps.

