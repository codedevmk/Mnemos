# Horizon -- Irem M62 raw-media contract.
# Local wrapper: D:\emu\irem\M72\Horizon_Arcade_EN.zip -> horizon.zip.
# The local folder is historical corpus sorting, not board proof; Horizon is
# tracked here as M62-style Z80/M6803 hardware. Region placement remains a
# contiguous artifact contract only until the executable M62 board profile lands.

