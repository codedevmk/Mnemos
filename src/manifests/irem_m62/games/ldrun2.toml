# Lode Runner II - The Bungeling Strikes Back -- Irem M62 region contract.
# Local wrapper: D:\emu\irem\M62\ldrun2.zip -> ldrun2.zip.
# Region placement follows public Irem M62 ROM metadata and the local CRC-clean
# corpus. Banked main ROM maps, exact KNA video priority, MC6803 port/timer
# behavior, and MSM5205 timing remain implementation gaps.

