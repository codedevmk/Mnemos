# Lode Runner III - Golden Labyrinth (Japan) -- Irem M62 region contract.
# Local wrapper: D:\emu\irem\M62\ldrun3j.zip -> ldrun3j.zip.
# Clone-specific Z80 program and B-board graphics dumps load from ldrun3j; the
# shared MC6803 sound ROM, tile graphics, PROM, and timing artifacts resolve
# through the local ldrun3 parent wrapper. Exact KNA video priority, MC6803
# port/timer behavior, bank behavior, and MSM5205 timing remain implementation
# gaps.

[set]
schema      = "mnemos-romset/1"
name        = "ldrun3j"
board       = "irem_m62"
parent      = "ldrun3"
orientation = "horizontal"

