# Lot Lot -- Irem M62 region contract.
# Local wrapper: D:\emu\irem\M62\lotlot.zip -> lotlot.zip.
# Region placement follows the M62 dump groups for the program, MC6803 sound,
# tile/sprite graphics, PROM, and timing artifacts. Exact Lot Lot bus behavior,
# KNA video priority, MC6803 port/timer behavior, and analog audio remain gaps.

