# Lode Runner III - Golden Labyrinth -- Irem M62 region contract.
# Local wrapper: D:\emu\irem\M62\ldrun3.zip -> ldrun3.zip.
# Region placement follows public Irem M62 ROM metadata and the local CRC-clean
# corpus. Exact KNA video priority, MC6803 port/timer behavior, bank behavior,
# and MSM5205 timing remain implementation gaps.

