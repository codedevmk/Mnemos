# Spelunker II - 23 no Kagi -- Irem M62 region contract.
# Local wrapper: D:\emu\irem\M62\spelunk2.zip -> spelunk2.zip.
# Region placement follows the local A/B/R board dump groups for the Z80
# program, MC6803 sound ROM, graphics, PROM, and timing artifacts. Exact title
# bus behavior, KNA video priority, MC6803 port/timer behavior, and analog audio
# remain gaps.

[set]
schema      = "mnemos-romset/1"
name        = "spelunk2"
board       = "irem_m62"
orientation = "horizontal"

