# Pound for Pound -- Irem M85 parent set.
# Schema mnemos-romset/1; this first-pass route preserves the M85 board
# identity while using the shared M81/M84-family V30/Z80/YM2151/DAC core.

[set]
schema      = "mnemos-romset/1"
name        = "poundfor"
board       = "irem_m85"
orientation = "horizontal"

[[region]]
name = "maincpu"
size = 0x100000

