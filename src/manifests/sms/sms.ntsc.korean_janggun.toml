# Sega Master System (NTSC, Janggun bit-reversed mapper) -- Mnemos system
# manifest (schema mnemos-manifest/1).
#
# The Janggun-mapper variant of sms.ntsc.toml. Identical to the Sega-mapper
# build EXCEPT the cartridge mapper and its banking surface:
#
#   - mapper chip type is `korean.janggun_mapper`, not `sega.sms_mapper`.
#   - 8 KiB banks: $0000-$3FFF fixed to banks 0/1, four banked windows with
#     per-16 KiB-page bit-reversed reads.
#   - TWO register surfaces:
#       * direct 8 KiB selects at $4000/$6000/$8000/$A000 -- these land inside the
#         cartridge window, so they route to the mapper via the region's
#         write_overlay (like the standard/MSX Korean mappers).
#       * Sega-style 16 KiB pair selects at $FFFE/$FFFF in the work-RAM mirror --
#         OUTSIDE the cartridge window, so they need the register overlay below
#         (the `sms.janggun_register_overlay` mmio_block), the same scheme the
#         Sega mapper uses for $FFFC-$FFFF.
#
# The Janggun mapper is force-only (no header signature to auto-detect), selected
# via sms_config::mapper::korean_janggun / `--mapper korean-janggun`. Inter-chip
# wiring is the same host-side glue in `manifests::sms::sms_callbacks`.

[manifest]
schema       = "mnemos-manifest/1"
id           = "sega.sms.ntsc.korean_janggun"
display_name = "Sega Master System (NTSC, Janggun mapper)"
family       = "sega"
revision     = 1

[clock]
# Z80 master clock; the VDP and PSG are ticked at the same rate (divider 1).
master_hz               = 3579545
master_to_cpu_divider   = 1
master_to_video_divider = 1

# --- Chips -------------------------------------------------------------------

[[chip]]
id           = "cpu"
type         = "zilog.z80"
attached_bus = "main"
[chip.config]
port_in_callback  = "sms.z80_port_in"
port_out_callback = "sms.z80_port_out"

[[chip]]
id           = "video"
type         = "sega.sms_vdp"
attached_bus = "main"
[chip.config]
irq_callback = "sms.vdp_irq"

[[chip]]
id           = "audio"
type         = "ti.sn76489"
attached_bus = "main"

[[chip]]
id           = "fm"
type         = "yamaha.ym2413"
attached_bus = "main"

[[chip]]
id           = "mapper"
type         = "korean.janggun_mapper"
attached_bus = "main"

# --- Bus topology ------------------------------------------------------------

[[bus]]
id           = "main"
address_bits = 16
endianness   = "little"

# Cartridge window: $0000-$BFFF routed through the Janggun mapper. Reads resolve
# the fixed first 16 KiB + the four banked windows (bit-reversed per page); the
# direct bank selects ($4000/$6000/$8000/$A000) write through the mapper here.
[[bus.region]]
name      = "cartridge"
range     = "0x0000-0xBFFF"
backing   = "mapper"
mapper_id = "mapper"

# Work RAM: 8 KiB at $C000-$DFFF, mirrored at $E000-$FFFF (A13 unconnected).
[[bus.region]]
name    = "work_ram"
range   = "0xC000-0xFFFF"
backing = "ram"
size    = 8192

# Janggun register overlay at $FFFE-$FFFF: the Sega-style 16 KiB pair selects sit
# in the work-RAM mirror, outside the cartridge window, so this overlay routes a
# write here to the mapper (sms.janggun_register_overlay -> janggun.cpu_write).
# Priority 2 (mmio_block default) wins over the work_ram region beneath.
[[mmio_block]]
name         = "sms.janggun_register_overlay"
attached_bus = "main"
range        = "0xFFFE-0xFFFF"
