# Sega Master System (NTSC, Codemasters mapper) -- Mnemos system manifest
# (schema mnemos-manifest/1).
#
# The Codemasters-mapper variant of sms.ntsc.toml. Identical to the Sega-mapper
# build EXCEPT the cartridge mapper and its banking surface:
#
#   - mapper chip type is `codemasters.mapper`, not `sega.sms_mapper`.
#   - There is NO `$FFFC-$FFFF` register overlay: the Codemasters page registers
#     live in ROM space ($0000 = slot 0, $4000 = slot 1, $8000 = slot 2). A bus
#     write into the cartridge window therefore routes straight to the mapper via
#     the region's write_overlay, so the `[[mmio_block]]` the Sega manifest needs
#     is absent here and `$FFFC-$FFFF` is ordinary work RAM.
#
# The adapter selects this manifest over sms.ntsc.toml per cart-header detection
# (the Codemasters checksum word pair at $7FE6/$7FE8). Inter-chip wiring is the
# same host-side glue in `manifests::sms::sms_callbacks`.

[manifest]
schema       = "mnemos-manifest/1"
id           = "sega.sms.ntsc.codemasters"
display_name = "Sega Master System (NTSC, Codemasters mapper)"
family       = "sega"
revision     = 1

[clock]
# Z80 master clock; the VDP and PSG are ticked at the same rate (divider 1).
master_hz               = 3579545
master_to_cpu_divider   = 1
master_to_video_divider = 1

# --- Chips -------------------------------------------------------------------

[[chip]]
id           = "cpu"
type         = "zilog.z80"
attached_bus = "main"
[chip.config]
port_in_callback  = "sms.z80_port_in"
port_out_callback = "sms.z80_port_out"

[[chip]]
id           = "video"
type         = "sega.sms_vdp"
attached_bus = "main"
[chip.config]
irq_callback = "sms.vdp_irq"

[[chip]]
id           = "audio"
type         = "ti.sn76489"
attached_bus = "main"

[[chip]]
id           = "fm"
type         = "yamaha.ym2413"
attached_bus = "main"

[[chip]]
id           = "mapper"
type         = "codemasters.mapper"
attached_bus = "main"

# --- Bus topology ------------------------------------------------------------

[[bus]]
id           = "main"
address_bits = 16
endianness   = "little"

# Cartridge window: $0000-$BFFF routed through the Codemasters mapper. Reads
# resolve ROM / cart-RAM through the live page registers; writes set the page
# registers ($0000/$4000/$8000) and, when enabled, the $A000-$BFFF cart RAM --
# all via the mapper's write_overlay. No separate register overlay exists.
[[bus.region]]
name      = "cartridge"
range     = "0x0000-0xBFFF"
backing   = "mapper"
mapper_id = "mapper"

# Work RAM: 8 KiB at $C000-$DFFF, mirrored at $E000-$FFFF (A13 unconnected).
# $FFFC-$FFFF is plain RAM here -- the Codemasters mapper has no register file.
[[bus.region]]
name    = "work_ram"
range   = "0xC000-0xFFFF"
backing = "ram"
size    = 8192
