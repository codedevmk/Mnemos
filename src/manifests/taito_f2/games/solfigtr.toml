# Solitary Fighter (World) -- Taito F2 / C91 with TC0190FMC sprite banking.
# Schema mnemos-romset/1; drop a copy of this file into the set zip as
# "game.toml" next to the dump files it names.
#
# Region names are the Mnemos board regions: "tiles" maps the TC0100SCN SCR
# dump, "sprites" maps TC0200OBJ object graphics, and "adpcma" maps YM2610
# ADPCM-A. This set has no Delta-T sample region.

[set]
schema = "mnemos-romset/1"
name   = "solfigtr"
board  = "taito_f2"
orientation = "horizontal"
taito_f2_map = "solfigtr"
taito_f2_palette_format = "rgbx_444"
taito_f2_sprite_policy = "banked"
taito_f2_sprite_buffering = "partial_delayed"
taito_f2_sprite_hide_pixels = 3
taito_f2_sprite_flip_hide_pixels = -3

[[region]]
name = "maincpu"
size = 0x080000

[[region.file]]
name   = "c91-05.59"
offset = 0x00000
stride = 2
size   = 0x40000
crc32  = 0xc1260e7c

[[region.file]]
name   = "c91-09.61"
offset = 0x00001
stride = 2
size   = 0x40000
crc32  = 0xd82b5266

[[region]]
name = "tiles"
size = 0x100000

[[region.file]]
name   = "c91-03.34"
offset = 0x000000
unit   = 2
stride = 2
swap   = true
size   = 0x100000
crc32  = 0x8965da12

[[region]]
name = "sprites"
size = 0x200000

[[region.file]]
name   = "c91-01.12"
offset = 0x000000
size   = 0x100000
crc32  = 0x0f3f4e00

[[region.file]]
name   = "c91-02.11"
offset = 0x100000
size   = 0x100000
crc32  = 0xe14ab98e

[[region]]
name = "audiocpu"
size = 0x10000

[[region.file]]
name   = "c91-07.62"
offset = 0x00000
size   = 0x10000
crc32  = 0xe471a05a

[[region]]
name = "adpcma"
size = 0x080000

[[region.file]]
name   = "c91-04.28"
offset = 0x00000
size   = 0x80000
crc32  = 0x390b1065
