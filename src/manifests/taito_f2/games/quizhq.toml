stride = 2
size   = 0x20000
crc32  = 0x12e14aca

[[region.file]]
name   = "c53-51.bin"
offset = 0x80001
stride = 2
size   = 0x20000
crc32  = 0xb3ef66f3

[[region]]
name = "tiles"
size = 0x100000
