# Liquid Kids (World) -- Taito F2 / C49.
# Schema mnemos-romset/1; drop a copy of this file into the set zip as
# "game.toml" next to the dump files it names.
#
# Region names are the Mnemos board regions: "tiles" maps the TC0100SCN SCR
# dump, "sprites" maps TC0200OBJ object graphics, and YM2610 ADPCM-A is
# "adpcma". This set has no Delta-T sample region.

[set]
schema = "mnemos-romset/1"
name   = "liquidk"
board  = "taito_f2"
orientation = "horizontal"
taito_f2_map = "liquidk"
taito_f2_input_profile = "standard"
taito_f2_text_gfx_source = "tc0100scn_ram_2bpp"
taito_f2_tc0100scn_bg_x_offset = 16
taito_f2_tc0100scn_text_x_offset = 23
taito_f2_tc0480scp_profile = "none"
taito_f2_io_profile = "tc0220ioc"
taito_f2_palette_profile = "tc0260dar"
taito_f2_priority_profile = "tc0360pri"
taito_f2_sprite_chip_pair = "tc0200obj_tc0210fbc"
taito_f2_sound_comm_chip = "tc0140syt"
taito_f2_video_profile = "tc0100scn"
taito_f2_aux_profile = "none"
taito_f2_vblank_irq_level = 5
taito_f2_sprite_dma_irq_level = 6
taito_f2_palette_format = "rgbx_444"
taito_f2_sprite_buffering = "partial_delayed"
taito_f2_sprite_hide_pixels = 3
taito_f2_sprite_flip_hide_pixels = 3

[[region]]
name = "maincpu"
size = 0x080000

[[region.file]]
name   = "c49-09.ic47"
offset = 0x00000
stride = 2
size   = 0x20000
crc32  = 0x6ae09eb9

[[region.file]]
name   = "c49-11.ic48"
offset = 0x00001
stride = 2
size   = 0x20000
crc32  = 0x42d2be6e

[[region.file]]
name   = "c49-10.ic45"
offset = 0x40000
stride = 2
size   = 0x20000
crc32  = 0x50bef2e0

[[region.file]]
name   = "c49-12.ic46"
offset = 0x40001
stride = 2
size   = 0x20000
crc32  = 0xcb16bad5

[[region]]
name = "tiles"
size = 0x080000

[[region.file]]
name   = "c49-03.ic76"
offset = 0x00000
unit   = 2
stride = 2
swap   = true
size   = 0x80000
crc32  = 0xc3364f9b

[[region]]
name = "sprites"
size = 0x100000

[[region.file]]
name   = "c49-01.ic54"
