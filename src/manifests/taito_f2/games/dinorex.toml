# Dino Rex (World) -- Taito F2 / D39 with TC0100SCN tilemaps and type-3
# TC0200OBJ sprite extension RAM.
# Schema mnemos-romset/1; drop a copy of this file into the set zip as
# "game.toml" next to the dump files it names.
#
# Region names are the Mnemos board regions: "tiles" maps the TC0100SCN SCR
# graphics, "sprites" maps TC0200OBJ object graphics, "adpcma" maps YM2610
# ADPCM-A, and "adpcmb" maps YM2610 Delta-T samples.

[set]
schema = "mnemos-romset/1"
name   = "dinorex"
board  = "taito_f2"
orientation = "horizontal"
taito_f2_map = "dinorex"
taito_f2_palette_format = "xrgb_555"
taito_f2_sprite_policy = "extension_3"
taito_f2_sprite_buffering = "immediate"
taito_f2_sprite_extension_base = 0x400000
taito_f2_sprite_extension_size = 0x1000
taito_f2_sprite_hide_pixels = 3
taito_f2_sprite_flip_hide_pixels = 3

[[region]]
name = "maincpu"
size = 0x300000

[[region.file]]
name   = "d39-14.9"
offset = 0x000000
stride = 2
size   = 0x080000
crc32  = 0xe6aafdac

[[region.file]]
name   = "d39-16.8"
offset = 0x000001
stride = 2
size   = 0x080000
crc32  = 0xcedc8537

[[region.file]]
