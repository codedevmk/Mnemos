# Quiz Chikyu Bouei Gun (Japan) -- Taito F2 / D19 with TC0100SCN tilemaps
# and qzchikyu-specific partial delayed TC0200OBJ buffering.
# Schema mnemos-romset/1; drop a copy of this file into the set zip as
# "game.toml" next to the dump files it names.
#
# Region names are the Mnemos board regions: "tiles" maps TC0100SCN SCR
# graphics, "sprites" maps TC0200OBJ object graphics, and "adpcma" maps
# YM2610 ADPCM-A samples.

[set]
schema = "mnemos-romset/1"
name   = "qzchikyu"
board  = "taito_f2"
orientation = "horizontal"
taito_f2_map = "qzchikyu"
taito_f2_palette_format = "xrgb_555"
taito_f2_sprite_buffering = "partial_delayed_qzchikyu"
taito_f2_sprite_hide_pixels = 0
taito_f2_sprite_flip_hide_pixels = 4

[[region]]
name = "maincpu"
size = 0x180000

[[region.file]]
name   = "d19-06.8"
offset = 0x000000
stride = 2
size   = 0x020000
crc32  = 0xde8c8e55

[[region.file]]
name   = "d19-05.7"
offset = 0x000001
stride = 2
size   = 0x020000
crc32  = 0xc6d099d0

[[region.file]]
name   = "d19-03.6"
offset = 0x100000
unit   = 2
stride = 2
swap   = true
size   = 0x080000
crc32  = 0x5c1b92c0

[[region]]
name = "tiles"
size = 0x100000

[[region.file]]
name   = "d19-02.10"
offset = 0x000000
unit   = 2
stride = 2
swap   = true
size   = 0x100000
crc32  = 0xf2dce2f2

[[region]]
name = "sprites"
size = 0x100000

[[region.file]]
name   = "d19-01.21"
offset = 0x000000
size   = 0x100000
crc32  = 0x6c4342d0

[[region]]
name = "audiocpu"
size = 0x10000

[[region.file]]
name   = "d19-07.5"
offset = 0x00000
size   = 0x10000
crc32  = 0xa8935f84

[[region]]
name = "adpcma"
size = 0x080000

[[region.file]]
name   = "d19-04.9"
offset = 0x000000
size   = 0x080000
crc32  = 0xd3c44905
