# Metal Black (World) -- Taito F2 / D12 with TC0480SCP tilemaps.
# Schema mnemos-romset/1; drop a copy of this file into the set zip as
# "game.toml" next to the dump files it names.
#
# Region names are the Mnemos board regions: "tiles" maps the TC0480SCP SCR
# graphics, "sprites" maps TC0200OBJ object graphics, "adpcma" maps YM2610
# ADPCM-A, and "adpcmb" maps Delta-T samples.

[set]
schema = "mnemos-romset/1"
name   = "metalb"
board  = "taito_f2"
orientation = "horizontal"
taito_f2_map = "metalb"
taito_f2_palette_format = "rgbx_444"
taito_f2_sprite_buffering = "partial_delayed"
taito_f2_sprite_hide_pixels = 3
taito_f2_sprite_flip_hide_pixels = 3

[[region]]
name = "maincpu"
size = 0x0c0000

[[region.file]]
name   = "d16-16.8"
offset = 0x00000
stride = 2
size   = 0x40000
crc32  = 0x3150be61

[[region.file]]
name   = "d16-18.7"
offset = 0x00001
stride = 2
size   = 0x40000
crc32  = 0x5216d092

[[region.file]]
name   = "d12-07.9"
offset = 0x80000
stride = 2
size   = 0x20000
crc32  = 0xe07f5136

[[region.file]]
name   = "d12-06.6"
offset = 0x80001
stride = 2
size   = 0x20000
crc32  = 0x131df731

[[region]]
name = "tiles"
size = 0x100000

[[region.file]]
name   = "d12-03.14"
offset = 0x00000
unit   = 2
stride = 4
size   = 0x80000
crc32  = 0x46b498c0

[[region.file]]
name   = "d12-04.13"
offset = 0x00002
unit   = 2
stride = 4
size   = 0x80000
crc32  = 0xab66d141

[[region]]
name = "sprites"
size = 0x100000

[[region.file]]
name   = "d12-01.20"
offset = 0x000000
size   = 0x100000
crc32  = 0xb81523b9

[[region]]
name = "audiocpu"
size = 0x20000

[[region.file]]
name   = "d12-13.5"
offset = 0x00000
size   = 0x20000
crc32  = 0xbcca2649

[[region]]
name = "adpcma"
size = 0x100000

[[region.file]]
name   = "d12-02.10"
offset = 0x000000
size   = 0x100000
crc32  = 0x79263e74

[[region]]
name = "adpcmb"
size = 0x080000

[[region.file]]
name   = "d12-05.16"
offset = 0x000000
size   = 0x080000
crc32  = 0x7fd036c5
