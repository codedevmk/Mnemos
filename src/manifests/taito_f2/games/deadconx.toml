# Dead Connection (World) -- Taito F2 / D28 with TC0480SCP tilemaps and
# TC0190FMC sprite banking.
# Schema mnemos-romset/1; drop a copy of this file into the set zip as
# "game.toml" next to the dump files it names.
#
# Region names are the Mnemos board regions: "tiles" maps the TC0480SCP SCR
# graphics, "sprites" maps TC0200OBJ object graphics, and "adpcma" maps
# YM2610 ADPCM-A. This set has no Delta-T sample region.

[set]
schema = "mnemos-romset/1"
name   = "deadconx"
board  = "taito_f2"
orientation = "horizontal"
taito_f2_map = "deadconx"
taito_f2_palette_format = "rgbx_444"
taito_f2_sprite_policy = "banked"
taito_f2_sprite_active_area = "y_word_bit0"
taito_f2_sprite_buffering = "full_delayed"
taito_f2_sprite_hide_pixels = 3
taito_f2_sprite_flip_hide_pixels = 3

[[region]]
name = "maincpu"
size = 0x100000

[[region.file]]
name   = "d28-06.3"
offset = 0x00000
stride = 2
size   = 0x40000
crc32  = 0x5b4bff51

