# Blade Master (Japan) -- Irem M92 clone of bmaster.
# Schema mnemos-romset/1. This split clone carries its unique program and
# board PAL dumps while inheriting shared media from the bmaster parent set.

[set]
schema      = "mnemos-romset/1"
name        = "crossbld"
parent      = "bmaster"
board       = "irem_m92"
orientation = "horizontal"
sound       = "encrypted_v35"

[[region]]
name = "maincpu"
size = 0x100000

[[region.file]]
name   = "bm_d-h0.ic25"
offset = 0x000001
stride = 2
size   = 0x40000
crc32  = 0xa28a5821

