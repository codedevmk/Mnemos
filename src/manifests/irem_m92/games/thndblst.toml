# Thunder Blaster (Japan) -- Irem M92-C-B clone of lethalth.
# The local split clone carries changed program/sound ROMs and C-board PLDs;
# shared graphics, samples, common A-board PLDs, and the second program pair
# resolve from the sibling lethalth parent wrapper.

[set]
schema      = "mnemos-romset/1"
name        = "thndblst"
parent      = "lethalth"
board       = "irem_m92"
orientation = "vertical"
sound       = "encrypted_v35"

