# Yakyuu Kakutou League-Man (alternate M92-Z-C ROM board) -- Irem M92 clone of
# nbbatman. The local alternate board carries its own split sprite layout and
# Z-board PLDs while shared tiles, samples, and upper program pair resolve from
# the Ninja Baseball Bat Man parent.

[set]
schema      = "mnemos-romset/1"
name        = "leaguemna"
parent      = "nbbatman"
board       = "irem_m92"
orientation = "horizontal"
players     = 4
sound       = "encrypted_v35"

