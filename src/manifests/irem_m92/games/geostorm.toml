# Geostorm (Japan) -- Irem M92 clone of gunforc2.
# Schema mnemos-romset/1. The first-pass M92 board can load the set, but the
# encrypted V35 sound program and GA21/GA22 video are not parity-authentic yet.

[set]
schema      = "mnemos-romset/1"
name        = "geostorm"
parent      = "gunforc2"
board       = "irem_m92"
orientation = "horizontal"
sound       = "encrypted_v35"

[[region]]
name = "maincpu"
size = 0x100000

[[region.file]]
name   = "a2_-h0-.ic37"
offset = 0x000001
stride = 2
size   = 0x40000
crc32  = 0x9be58d09

[[region.file]]
name   = "a2_-l0-.ic49"
offset = 0x000000
stride = 2
size   = 0x40000
crc32  = 0x59abb75d

[[region.file]]
name   = "a2_-h1-.ic36"
offset = 0x080001
stride = 2
size   = 0x40000
crc32  = 0x34280b88

[[region.file]]
name   = "a2_-l1-.ic48"
offset = 0x080000
stride = 2
size   = 0x40000
crc32  = 0xc8c13f51
