# Kaitei Daisensou (Japan) -- Irem M92-E-B clone of inthunt.
# The local split clone carries a full replacement program region; shared sound,
# graphics, samples, and PLDs resolve from the sibling parent.

[set]
schema      = "mnemos-romset/1"
name        = "kaiteids"
parent      = "inthunt"
board       = "irem_m92"
orientation = "horizontal"
sound       = "encrypted_v35"

[[region]]
name = "maincpu"
size = 0x100000

[[region.file]]
name   = "ith_-h0-.ic28"
offset = 0x000001
stride = 2
size   = 0x40000
crc32  = 0xdc1dec36

[[region.file]]
name   = "ith_-l0-.ic39"
offset = 0x000000
stride = 2
size   = 0x40000
crc32  = 0x8835d704

[[region.file]]
name   = "ith_-h1-.ic38"
offset = 0x080001
stride = 2
size   = 0x20000
crc32  = 0x5a7b212d

[[region.file]]
name   = "ith_-l1-.ic27"
offset = 0x080000
stride = 2
size   = 0x20000
crc32  = 0x4c084494
