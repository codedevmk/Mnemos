# Panther -- Irem M27 ROM contract.
# Local wrapper: D:\emu\irem\Panther_Arcade_EN.zip -> panther.zip.
# Region names, offsets, sizes, and CRCs follow public Irem M27 set metadata;
# executable M27 board timing, color, video, inputs, and sound behavior remain gaps.

[set]
schema      = "mnemos-romset/1"
name        = "panther"
board       = "irem_m27"
orientation = "horizontal"

[[region]]
name = "maincpu"
size = 0x10000

[[region.file]]
name    = "qr-1.bin"
aliases = ["panther/qr-1.bin"]
offset  = 0x0000
size    = 0x0800
crc32   = 0x406dc606

