# Mega Man: The Power Battle (Asia 951006) -- Capcom CPS1. Hand-authored from the
# reference part tables; CRCs from the local ROM zip (the rcma_* program + rcm_09
# audio identify this as the Asia revision; gfx/oki are shared with the parent).
# Runs the default CPS-B-21 register layout with the RCM63B 4-bank gfx mapper
# (all four layer types span the full four 0x8000-code banks; see profile 44).

[set]
schema = "mnemos-romset/1"
name   = "megaman"
board  = "capcom_cps1"
cps_b_profile = 44

