# Muscle Bomber Duo: Ultimate Team Battle (World 931206) -- Capcom CPS1 (QSound).
# Transcribed from the MAME ROM tables (the Emu reference lacks this set); CRCs from
# the local ROM zip. QSound + Kabuki sound (shares Slam Masters' key); CPS-B-21
# "QS5" profile + the MB63B gfx mapper. Shares gfx + QSound samples with slammast.

