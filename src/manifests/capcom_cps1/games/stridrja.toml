# Strider Hiryu (Japan) -- Capcom CPS1 clone of strider (parent-merge). Transcribed from the
# reference part tables; CRCs from the local zips (clone-unique from stridrja.zip,
# shared from strider.zip). Shares the parent's gfx ROMs, so it reuses the
# parent's CPS-B profile (101).

