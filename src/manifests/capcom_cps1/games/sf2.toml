# Street Fighter II: The World Warrior (World 910522) -- Capcom CPS1.
# Hand-authored from the reference part tables; CRCs from the local ROM zip.
# The original SF2 runs a CPS_B_11 register layout with the STF29 gfx mapper,
# which is byte-identical to the S9263B mapper used by sf2ce (see profile 43).
# Program ROMs are byte-interleaved (even/odd 0x20000 halves), unlike the later
# word-swapped Champion Edition.

[set]
schema = "mnemos-romset/1"
name   = "sf2"
board  = "capcom_cps1"
cps_b_profile = 43

