# Chiki Chiki Boys (Japan) -- Capcom CPS1 clone of mtwins (parent-merge). Transcribed from the
# reference part tables; CRCs from the local zips (clone-unique from chikij.zip,
# shared from mtwins.zip). Shares the parent's gfx ROMs, so it reuses the
# parent's CPS-B profile (14).

[set]
schema = "mnemos-romset/1"
name   = "chikij"
board  = "capcom_cps1"
parent = "mtwins"
cps_b_profile = 14

