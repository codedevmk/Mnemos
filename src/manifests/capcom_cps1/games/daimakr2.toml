# Daimakaimura (Japan Resale Ver.) -- Capcom CPS1 clone of ghouls (parent-merge). Transcribed from the
# reference part tables; CRCs from the local zips (clone-unique from daimakr2.zip,
# shared from ghouls.zip). Runs its own board, so it carries its own
# CPS-B profile (36), not the parent's.

[set]
schema = "mnemos-romset/1"
name   = "daimakr2"
board  = "capcom_cps1"
parent = "ghouls"
cps_b_profile = 36

