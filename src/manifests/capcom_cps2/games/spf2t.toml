# spf2t -- Capcom CPS2 (generated by scripts/gen_cps2_game_tomls.py)
#
# The 20-byte board key is an external asset, resolved at runtime from a
# zip/parent-zip .key entry or keys/spf2t*.key sidecar (validated by decryption),
# never committed.

