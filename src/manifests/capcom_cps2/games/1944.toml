# 1944: The Loop Master -- Capcom CPS2
#
# CPS-2 board: encrypted 68000 program (the 20-byte board key is an external
# asset -- supplied as a `keys/1944.key` sidecar beside the set zip, never
# committed). Slot convention: .03/.04/.05 = program (word-swapped), .01 = the
# QSound Z80, .11m/.12m = QSound samples (word-swapped), .13m-.20m = gfx (word-
# lane interleaved; the board then unshuffles each 0x200000 bank). 1944 is a
# vertical (TATE) game; the upright rotation is a later refinement.

[set]
schema = "mnemos-romset/1"
name   = "1944"
board  = "capcom_cps2"

# --- encrypted 68000 program: slots 3,4,5 word-swapped, concatenated ---
[[region]]
name = "maincpu"
size = 0x180000

[[region.file]]
name   = "nffu.03"
offset = 0x0
unit   = 2
swap   = true
stride = 2
size   = 0x80000
crc32  = 0x9693cf8f

[[region.file]]
name   = "nff.04"
offset = 0x80000
unit   = 2
swap   = true
stride = 2
size   = 0x80000
crc32  = 0xdba1c66e

[[region.file]]
name   = "nffu.05"
offset = 0x100000
unit   = 2
swap   = true
stride = 2
size   = 0x80000
crc32  = 0xea813eb7

# --- QSound Z80: low 32 KiB fixed at 0, the rest banked from 0x10000 ---
[[region]]
name = "audiocpu"
size = 0x28000

[[region.file]]
name          = "nff.01"
offset        = 0x0
source_offset = 0x0
length        = 0x8000
size          = 0x20000
crc32         = 0xd2e44318

[[region.file]]
name          = "nff.01"
offset        = 0x10000
source_offset = 0x8000
length        = 0x18000
size          = 0x20000
crc32         = 0xd2e44318

# --- QSound DL-1425 samples: slots 11,12 word-swapped, concatenated ---
[[region]]
name = "qsound"
size = 0x800000

[[region.file]]
name   = "nff.11m"
offset = 0x0
unit   = 2
swap   = true
stride = 2
size   = 0x400000
crc32  = 0x243e4e05

[[region.file]]
name   = "nff.12m"
offset = 0x400000
unit   = 2
swap   = true
stride = 2
size   = 0x400000
crc32  = 0x4fcf1600

# --- gfx: word-lane interleave (unit=2, stride=8, lane offset); group 0 at base
# 0, group 1 at 0x1000000. The board unshuffles each 0x200000 bank at load. ---
[[region]]
name = "gfx"
size = 0x1400000

[[region.file]]
name   = "nff.13m"
offset = 0x0
unit   = 2
stride = 8
size   = 0x400000
crc32  = 0xc9fca741

[[region.file]]
name   = "nff.15m"
offset = 0x2
unit   = 2
stride = 8
size   = 0x400000
crc32  = 0xf809d898

[[region.file]]
name   = "nff.17m"
offset = 0x4
unit   = 2
stride = 8
size   = 0x400000
crc32  = 0x15ba4507

[[region.file]]
name   = "nff.19m"
offset = 0x6
unit   = 2
stride = 8
size   = 0x400000
crc32  = 0x3dd41b8c

[[region.file]]
name   = "nff.14m"
offset = 0x1000000
unit   = 2
stride = 8
size   = 0x100000
crc32  = 0x3fe3a54b

[[region.file]]
name   = "nff.16m"
offset = 0x1000002
unit   = 2
stride = 8
size   = 0x100000
crc32  = 0x565cd231

[[region.file]]
name   = "nff.18m"
offset = 0x1000004
unit   = 2
stride = 8
size   = 0x100000
crc32  = 0x63ca5988

[[region.file]]
name   = "nff.20m"
offset = 0x1000006
unit   = 2
stride = 8
size   = 0x100000
crc32  = 0x21eb8f3b
