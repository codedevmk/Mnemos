# Vs 10-Yard Fight (World) -- Irem M58 split-clone ROM contract.
# The split clone carries replacement program and tile dumps and inherits shared
# sound, sprite, and PROM regions from the 10yard parent set.

[set]
schema      = "mnemos-romset/1"
name        = "vs10yard"
parent      = "10yard"
board       = "irem_m58"
orientation = "horizontal"

[[region]]
