# R-Type (World) -- Irem M72, the board family's first game (ADR-0012).
# Schema mnemos-romset/1; the adapter embeds this checked-in manifest and
# resolves it from the standard set zip name, so no game.toml copy is required.
#
# The V30 program is two even/odd-interleaved pairs; the second pair reloads
# at the top of the 1 MiB region so the FFFF0 reset vector lands in ROM.
# There is no sound program dump: the M72 sound CPU runs from RAM the main
# CPU fills at boot. The 32K sprite dumps repeat in the 32K hole after each
# (the board sees 64K windows); tiles are four bitplane files per playfield.

[set]
schema = "mnemos-romset/1"
name   = "rtype"
board  = "irem_m72"

