# R-Type (World) -- Irem M72, the board family's first game (ADR-0012).
# Schema mnemos-romset/1; drop a copy of this file into the set zip as
# "game.toml" next to the dump files it names.
#
# The V30 program is two even/odd-interleaved pairs; the second pair reloads
# at the top of the 1 MiB region so the FFFF0 reset vector lands in ROM.
# There is no sound program dump: the M72 sound CPU runs from RAM the main
# CPU fills at boot. The 32K sprite dumps repeat in the 32K hole after each
# (the board sees 64K windows); tiles are four bitplane files per playfield.

[set]
schema = "mnemos-romset/1"
name   = "rtype"
board  = "irem_m72"

[[region]]
name = "maincpu"
size = 0x100000

[[region.file]]
name   = "rt_r-h0-b.1b"
offset = 0x00001
stride = 2
size   = 0x10000
crc32  = 0x591c7754

[[region.file]]
name   = "rt_r-l0-b.3b"
offset = 0x00000
stride = 2
size   = 0x10000
crc32  = 0xa1928df0

[[region.file]]
name   = "rt_r-h1-b.1c"
offset = 0x20001
stride = 2
size   = 0x10000
crc32  = 0xa9d71eca

[[region.file]]
name   = "rt_r-l1-b.3c"
offset = 0x20000
stride = 2
size   = 0x10000
crc32  = 0x0df3573d

# Boot-chunk reload of the second pair at the top of the region.
[[region.file]]
name   = "rt_r-h1-b.1c"
offset = 0xE0001
stride = 2
size   = 0x10000
crc32  = 0xa9d71eca

[[region.file]]
name   = "rt_r-l1-b.3c"
