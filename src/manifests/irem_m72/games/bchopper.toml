# Battle Chopper (World) -- Irem M72 protected board.
# Schema mnemos-romset/1; the adapter embeds this checked-in manifest and
# resolves it from the standard set zip name, so no game.toml copy is required.
#
# This is the M72-C parent set for Mr. Heli. It carries an i8751 protection MCU
# and a sample ROM; the Z80 still uses the board's RAM-upload sound path.

[set]
schema      = "mnemos-romset/1"
name        = "bchopper"
board       = "irem_m72"
orientation = "horizontal"

