# Saigo no Nindou (Japan) -- Irem M72 protected clone of nspirit.
# Schema mnemos-romset/1; the adapter embeds this checked-in manifest and
# resolves it from the standard set zip name, so no game.toml copy is required. Shared program, graphics, and
# sample dumps may be resolved from nspirit.zip through the parent fallback.

