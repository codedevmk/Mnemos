# Fire Barrel -- Irem M107 set.
# Schema mnemos-romset/1; this is a ROM-contract manifest only. The executable
# M107 board profile remains separate from older Irem board families.

[set]
schema      = "mnemos-romset/1"
name        = "firebarr"
board       = "irem_m107"
orientation = "horizontal"

# SW1/SW2 metadata from the shared Fire Barrel / Air Assault input profile.
# The separate SW3 coin/system DIP word is not represented by the current
# single-word manifest DIP surface.
[[dip]]
bank = "SW1"
name = "Lives"
mask = 0x0003
default = 0x0003

[[dip.option]]
label = "2"
value = 0x0000

[[dip.option]]
