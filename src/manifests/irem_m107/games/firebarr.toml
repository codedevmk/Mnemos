# Fire Barrel -- Irem M107 set.
# Schema mnemos-romset/1; this is a ROM-contract manifest only. The executable
# M107 board profile remains separate from older Irem board families.

[set]
schema      = "mnemos-romset/1"
name        = "firebarr"
board       = "irem_m107"
orientation = "horizontal"

[[region]]
name = "maincpu"
size = 0x100000

[[region.file]]
name   = "f4-a-h0-c.h0"
offset = 0x00001
stride = 2
size   = 0x40000
crc32  = 0x2aa5676e

[[region.file]]
name   = "f4-a-l0-c.l0"
offset = 0x00000
stride = 2
size   = 0x40000
crc32  = 0x42f75d59

[[region.file]]
