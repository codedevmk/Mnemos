# Air Assault / Air Duel US -- Irem M107 set.
# Schema mnemos-romset/1; this is a ROM-contract manifest only. The executable
# M107 board profile remains separate from older Irem board families.

[set]
schema      = "mnemos-romset/1"
name        = "airass"
board       = "irem_m107"
orientation = "horizontal"

[[region]]
name = "maincpu"
size = 0x100000

[[region.file]]
name   = "f4-a-h0-etc.h0"
offset = 0x00001
stride = 2
size   = 0x40000
crc32  = 0x038f2cbd

[[region.file]]
name   = "f4-a-l0-etc.l0"
offset = 0x00000
stride = 2
size   = 0x40000
crc32  = 0xd3eb7842

[[region.file]]
name   = "f4-a-h1-ss.h1"
offset = 0x80001
stride = 2
size   = 0x20000
crc32  = 0x4cb1c9ae

[[region.file]]
name   = "f4-a-l1-ss.l1"
offset = 0x80000
stride = 2
size   = 0x20000
crc32  = 0x1ddd192d

# Boot-chunk reload of the final program pair at the top of the 1 MiB CPU space.
