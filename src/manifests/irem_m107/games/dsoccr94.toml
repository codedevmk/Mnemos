# Dream Soccer '94 (World, M107 hardware) -- Irem M107 set.
# Schema mnemos-romset/1; this is a ROM-contract manifest only. The executable
# M107 board profile remains diagnostic until GA21/GA22 video parity is proven.

[set]
schema      = "mnemos-romset/1"
name        = "dsoccr94"
board       = "irem_m107"
orientation = "horizontal"

# Dream Soccer '94 uses the four-player M107 input profile. SW3:1,2 select
# player power; the manual marks SW3:3-8 as not for normal operation.
