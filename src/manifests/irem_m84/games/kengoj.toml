# Ken-Go (Japan) -- local Irem M84 V35-family split clone of ltswords.
# Schema mnemos-romset/1; this clone ZIP carries only its Japan program pair
# and inherits the checked-in Lightning Swords media contract.

[set]
schema      = "mnemos-romset/1"
name        = "kengoj"
parent      = "ltswords"
board       = "irem_m84"
orientation = "horizontal"

[[region]]
name = "maincpu"
size = 0x100000

[[region.file]]
name   = "ken_d-h0-.ic55"
offset = 0x00001
stride = 2
size   = 0x20000
crc32  = 0xed3da88c

[[region.file]]
name   = "ken_d-l0-.ic61"
offset = 0x00000
stride = 2
size   = 0x20000
crc32  = 0x92c57d8e

[[region.file]]
name   = "ken_d-h0-.ic55"
offset = 0xC0001
stride = 2
size   = 0x20000
crc32  = 0xed3da88c

[[region.file]]
name   = "ken_d-l0-.ic61"
offset = 0xC0000
stride = 2
size   = 0x20000
crc32  = 0x92c57d8e
