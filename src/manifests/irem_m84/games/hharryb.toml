# Hammerin' Harry (bootleg) -- local Irem M84 split clone of hharry.
# Schema mnemos-romset/1; this manifest records the M84-specific program/PAL
# dumps and inherits shared graphics, sound, samples, and PROMs from hharry.

[set]
schema      = "mnemos-romset/1"
name        = "hharryb"
parent      = "hharry"
board       = "irem_m84"
orientation = "horizontal"

[[region]]
name = "maincpu"
size = 0x100000

[[region.file]]
name   = "4-a-27c010a.bin"
offset = 0x00001
stride = 2
size   = 0x20000
crc32  = 0x755c0874

[[region.file]]
name   = "6-a-27c010a.bin"
offset = 0x00000
stride = 2
size   = 0x20000
crc32  = 0xf10fb55c

[[region.file]]
name   = "3-a-27c512.bin"
offset = 0x60001
stride = 2
size   = 0x10000
crc32  = 0x31b741c5

[[region.file]]
name   = "5-a-27c512.bin"
offset = 0x60000
stride = 2
size   = 0x10000
crc32  = 0xb23e966c

[[region.file]]
name   = "3-a-27c512.bin"
offset = 0xE0001
stride = 2
size   = 0x10000
crc32  = 0x31b741c5

[[region.file]]
name   = "5-a-27c512.bin"
offset = 0xE0000
stride = 2
size   = 0x10000
crc32  = 0xb23e966c

[[region]]
name = "plds"
size = 0x0104

[[region.file]]
