# Cosmic Cop -- Irem M84 V35-family clone of gallop.
# Schema mnemos-romset/1. The local split set carries its own program,
# sound, graphics, and sample ROMs while inheriting Gallop PROM/PLD artifacts.

[set]
schema      = "mnemos-romset/1"
name        = "cosmccop"
parent      = "gallop"
board       = "irem_m84"
orientation = "horizontal"

[[region]]
name = "maincpu"
size = 0x100000

[[region.file]]
name   = "cc-d-h0b.bin"
offset = 0x00001
stride = 2
size   = 0x40000
crc32  = 0x38958b01

