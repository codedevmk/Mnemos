[[hle]]
chip      = "irem_m84_prom_pld"
profile   = "irem_m84.ltswords_prom_pld_reference_defaults"
rationale = "The local ltswords corpus lacks the small color PROM and PAL artifacts listed for this board. The first-pass M84 route declares that gap explicitly while loading only CRC-verified resident program, graphics, sound, and sample ROMs."
