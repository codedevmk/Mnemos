# Lightning Swords / Ken-Go (prototype) -- local Irem M84 V35-family set.
# Schema mnemos-romset/1; this manifest records the program, graphics, sound,
# and sample dumps present in the local loose corpus.

[set]
schema      = "mnemos-romset/1"
name        = "ltswords"
board       = "irem_m84"
orientation = "horizontal"

[[region]]
name = "maincpu"
size = 0x100000

[[region.file]]
name   = "h0.ic55"
offset = 0x00001
stride = 2
size   = 0x20000
crc32  = 0x22f342b2

[[region.file]]
name   = "l0.ic61"
offset = 0x00000
stride = 2
size   = 0x20000
crc32  = 0x0210d592

